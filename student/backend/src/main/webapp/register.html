<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elective Navigator - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 relative overflow-y-auto">

    <!-- Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[10%] left-[20%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
        <div class="absolute bottom-[10%] right-[20%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
    </div>

    <div class="w-full max-w-2xl bg-white hover:bg-slate-50 backdrop-blur-xl border border-slate-200 p-8 rounded-3xl shadow-2xl relative">
        
        <a href="index.html" class="absolute top-8 left-8 text-slate-500 hover:text-slate-800 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>

        <div class="text-center mb-10 mt-6">
            <h2 class="text-3xl font-bold mb-2">Create an Account</h2>
            <p class="text-slate-500 text-sm">Join the platform to choose your specialized electives.</p>
        </div>

        <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">Full Name</label>
                <input type="text" id="name" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="John Doe">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">Student ID</label>
                <input type="text" id="studentId" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="e.g. STU1234">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">Course</label>
                <input type="text" id="course" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="B.Tech Computer Science">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">Semester</label>
                <select id="semester" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Select Semester</option>
                    <option value="1">1st Semester</option>
                    <option value="2">2nd Semester</option>
                    <option value="3">3rd Semester</option>
                    <option value="4">4th Semester</option>
                    <option value="5">5th Semester</option>
                    <option value="6">6th Semester</option>
                    <option value="7">7th Semester</option>
                    <option value="8">8th Semester</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">University Roll No</label>
                <input type="text" id="universityRollNo" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="12456789">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600">Section</label>
                <input type="text" id="section" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="e.g. A, B, C">
            </div>

            <div class="space-y-2 md:col-span-2">
                <label class="text-sm font-medium text-slate-600">Password</label>
                <input type="password" id="password" required class="w-full bg-white border border-slate-200 shadow-sm border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="••••••••">
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-slate-800 font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/25 flex justify-center items-center gap-2">
                    Register Account
                </button>
            </div>
            
            <div id="messageBox" class="md:col-span-2 hidden p-4 rounded-xl text-sm font-medium text-center"></div>

        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            Already have an account? <a href="login.html" class="text-indigo-600 hover:text-indigo-600 font-semibold transition-colors">Log in here</a>
        </p>

    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
    </script>
</body>
</html>
